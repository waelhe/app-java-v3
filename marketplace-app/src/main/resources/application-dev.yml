spring:
  docker:
    compose:
      enabled: ${DOCKER_COMPOSE_ENABLED:false}
      file: ../docker-compose.yml

  datasource:
    url: jdbc:postgresql://localhost:5432/marketplace
    username: ${DB_USERNAME:marketplace}
    password: ${DB_PASSWORD:marketplace}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    clean-disabled: false

  quartz:
    job-store-type: memory

  cache:
    type: simple

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  modulith:
    events:
      completion-mode: delete

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-client}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,profile,email
        provider:
          google:
            authorization-uri: ${GOOGLE_AUTH_URI:http://localhost:8080/oauth2/authorize}
            token-uri: ${GOOGLE_TOKEN_URI:http://localhost:8080/oauth2/token}
            user-info-uri: ${GOOGLE_USER_INFO_URI:http://localhost:8080/oauth2/userinfo}
            user-name-attribute: sub
            jwk-set-uri: ${GOOGLE_JWK_SET_URI:http://localhost:8080/oauth2/jwks}
      resourceserver:
        jwt:
          public-key-location: classpath:keys/dev-rsa.pub
          audiences:
            - marketplace-api

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.marketplace: DEBUG

marketplace:
  cors:
    allowed-origins: http://localhost:3000
  security:
    auth-server:
      issuer: http://localhost:8080
    jwt:
      keystore:
        path: ${JWT_KEYSTORE_PATH:./marketplace-app/local/dev-authserver.jks}
        password: ${JWT_KEYSTORE_PASSWORD:changeit}
        alias: ${JWT_KEY_ALIAS:marketplace-auth}
        key-password: ${JWT_KEY_PASSWORD:changeit}
