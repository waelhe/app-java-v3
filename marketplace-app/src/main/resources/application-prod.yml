spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN:5}

  jpa:
    show-sql: false

  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  flyway:
    clean-disabled: true

  quartz:
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          jobStore:
            isClustered: true

  cache:
    type: redis

  modulith:
    events:
      completion-mode: archive
      staleness:
        publication-threshold: 6h
        processing-threshold: 1h
      republish-outstanding-events-on-restart: true


  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}
          audiences:
            - marketplace-api

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

server:
  shutdown: graceful

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    com.marketplace: INFO

management:
  endpoint:
    health:
      show-details: never
      show-components: never
      probes:
        enabled: true
      group:
        readiness:
          include: db,redis,diskSpace
        liveness:
          include: ping
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,modulith
  observations:
    enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 0.1

marketplace:
  security:
    authorization-server-enabled: ${AUTH_SERVER_ENABLED:false}
    oauth2-login-enabled: false
    webauthn-enabled: false
    jwt:
      keystore:
        path: ${JWT_KEYSTORE_PATH:}
        password: ${JWT_KEYSTORE_PASSWORD:}
        alias: ${JWT_KEYSTORE_ALIAS:}
        key-password: ${JWT_KEYSTORE_KEY_PASSWORD:}
