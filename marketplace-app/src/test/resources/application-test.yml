spring:
  cache:
    type: simple
  quartz:
    job-store-type: memory
    auto-startup: false
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test
            client-secret: test
        provider:
          google:
            issuer-uri: https://accounts.google.com
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com

marketplace:
  cors:
    allowed-origins: http://localhost:3000
