spring:
  application:
    name: marketplace

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/marketplace
    username: ${DB_USERNAME:marketplace}
    password: ${DB_PASSWORD:marketplace}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 60000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        session:
          events:
            LOG: off
        default_batch_fetch_size: 100
        query:
          fail_on_pagination_over_collection_fetch: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true

  modulith:
    events:
      completion-mode: update

  mvc:
    problemdetails:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring.lifecycle.timeout: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  observations:
    enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 0.1

logging:
  pattern:
    correlation: "[${correlationId:-}]"
  level:
    org.springframework.modulith: INFO
    org.hibernate.SQL: WARN