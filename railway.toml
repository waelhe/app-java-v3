[build]
builder = "NIXPACKS"

[phases.build]
cmd = "chmod +x mvnw && ./mvnw clean package -DskipTests -B -pl marketplace-app -am"

[deploy]
healthcheckPath = "/actuator/health/liveness"
healthcheckTimeout = 300

[start]
cmd = "if [ -n \"$PORT\" ] && [ -z \"$SERVER_PORT\" ]; then export SERVER_PORT=$PORT; fi && java -jar marketplace-app/target/*.jar"
