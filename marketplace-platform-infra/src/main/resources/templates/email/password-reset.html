<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Reset Your Password</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto;">
<h1 style="color: #2d6a4f;">Reset Your Password</h1>
<p th:text="'Hello, ' + ${name} + '!'">Hello, User!</p>
<p>We received a request to reset your password. Click the link below to choose a new one:</p>
<p style="margin: 20px 0;">
    <a th:href="${resetLink}"
       style="background-color: #2d6a4f; color: #fff; padding: 12px 24px; text-decoration: none; border-radius: 4px;">
        Reset Password
    </a>
</p>
<p style="font-size: 14px; color: #666;">This link will expire in
    <span th:text="${expirationMinutes}">30</span> minutes.</p>
<hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;" />
<p style="font-size: 12px; color: #999;">If you did not request a password reset, please ignore this email.
    Your password will remain unchanged.</p>
</body>
</html>
