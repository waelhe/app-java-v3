<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Order Confirmation</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto;">
<h1 style="color: #2d6a4f;">Order Confirmed!</h1>
<p th:text="'Hello, ' + ${name} + '!'">Hello, User!</p>
<p>Your order has been confirmed. Here are the details:</p>
<table style="width: 100%; border-collapse: collapse; margin: 16px 0;">
    <tr style="background-color: #f5f5f5;">
        <td style="padding: 8px; border: 1px solid #ddd;"><strong>Order ID</strong></td>
        <td style="padding: 8px; border: 1px solid #ddd;" th:text="${orderId}">ORD-001</td>
    </tr>
    <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><strong>Service</strong></td>
        <td style="padding: 8px; border: 1px solid #ddd;" th:text="${serviceName}">Service Name</td>
    </tr>
    <tr style="background-color: #f5f5f5;">
        <td style="padding: 8px; border: 1px solid #ddd;"><strong>Date</strong></td>
        <td style="padding: 8px; border: 1px solid #ddd;" th:text="${bookingDate}">2025-01-01</td>
    </tr>
    <tr>
        <td style="padding: 8px; border: 1px solid #ddd;"><strong>Total</strong></td>
        <td style="padding: 8px; border: 1px solid #ddd;" th:text="${total}">$0.00</td>
    </tr>
</table>
<p>Thank you for your purchase!</p>
<hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;" />
<p style="font-size: 12px; color: #999;">This is an automated email. Please do not reply.</p>
</body>
</html>
